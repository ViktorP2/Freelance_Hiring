<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreelanceHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">FreelanceHub</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#jobs">Jobs</a></li>
            </ul>
            <div class="auth-btns">
                <button class="btn" onclick="openModal()">Login</button>
            </div>
        </nav>
    </header>
    <section class="hero" id="home">
        <h1>Find Freelance Work</h1>
        <p>Discover and apply for freelance opportunities that match your skills.</p>
        <div class="search-box">
            <input type="text" class="search-input" id="search-input" placeholder="Search for jobs...">
            <button class="search-btn">Search</button>
        </div>
    </section>
    <div class="container"></div>

    <div class="container">
        <div class="filter">
            <select class="filter-select" id="category-filter" onchange="filterJobs()">
                <option>All Categories</option>
                <option>Web development</option>
                <option>Design</option>
            </select>
        </div>
        <div class="jobs-grid" id="jobsGrid"><!-- Here is rendered jobs --></div>
    </div>
    <footer>
        <p>&copy; 2026 FreelanceHub. Built for freelancers.</p>
    </footer>
<!-- Modal for login -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 class="modal-title">Welcome Back</h2>
            <p class="modal-subtitle">Log in to your FreelanceHub account</p>

            <div class="role-toggle">
                <button class="role-btn active" id="freelancerBtn" onclick="setRole('freelancer')">Freelancer</button>
                <button class="role-btn" id="companyBtn" onclick="setRole('company')">Company</button>
            </div>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="emailInput" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="passwordInput" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>

            <p class="modal-footer">Don't have an account? <a href="#" onclick="closeModal()">Sign up</a></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
